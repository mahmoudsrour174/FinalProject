<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my pharmacy</title>
  <style>
  
    header {
      background: #2e8b57;
      color: white;
      text-align: center;
      padding: 15px;
  
    }
    input, button {
      width: 40%;
      padding: 8px;
    }
    button {
      background: #2e8b57;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #246b45;
    }
    footer {
      text-align: center;
      padding: 10px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>my pharmacy</h1>
  </header>

  <center>
    <div class="login-box">
      <h2>Login</h2>
      <form>
        <input type="text" placeholder="Username"><br><br>
        <input type="password" placeholder="Password"><br><br>
        <button type="submit">Login</button>
      </form>
    </div>
  </center>

  <footer>
    <p>&copy; 2026 mypharmacy</p>
  </footer>
</body>
</html>
